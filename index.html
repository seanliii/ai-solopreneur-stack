const deptLabels = {
  content:"📄 内容", design:"🎨 设计", code:"💻 工程", marketing:"📢 营销",
  support:"🎧 客服", research:"🔬 研究", video:"🎬 视频", legal:"⚖️ 法务",
  finance:"💰 财务", productivity:"⚡ 效率"
};
const deptClasses = {
  content:"dept-content", design:"dept-design", code:"dept-code", marketing:"dept-marketing",
  support:"dept-support", research:"dept-research", video:"dept-video", legal:"dept-legal",
  finance:"dept-finance", productivity:"dept-productivity"
};

let currentDept = 'all';
let searchQuery = '';
let currentView = 'cards';

function init() {
  const filterGroup = document.getElementById('filterGroup');
  const depts = [...new Set(employees.map(e=>e.dept))];
  depts.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.dept = d;
    btn.textContent = deptLabels[d];
    btn.onclick = () => filterDept(d);
    filterGroup.appendChild(btn);
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    render();
  });

  render();
  updateStats();
}

function getFiltered() {
  return employees.filter(e => {
    const matchDept = currentDept === 'all' || e.dept === currentDept;
    const q = searchQuery;
    const matchSearch = !q || e.name.toLowerCase().includes(q) || e.role.toLowerCase().includes(q) || e.skills.some(s=>s.toLowerCase().includes(q));
    return matchDept && matchSearch;
  });
}

function render() {
  const filtered = getFiltered();
  const noResults = document.getElementById('noResults');
  const grid = document.getElementById('grid');
  const tableView = document.getElementById('tableView');

  if (filtered.length === 0) {
    noResults.style.display = 'block';
    grid.style.display = 'none';
    tableView.style.display = 'none';
    return;
  }
  noResults.style.display = 'none';

  if (currentView === 'cards') {
    grid.style.display = 'grid';
    tableView.style.display = 'none';
    grid.innerHTML = filtered.map(e => `
      <div class="employee-card" onclick="openModal(${e.id})">
        <div class="dept-badge ${deptClasses[e.dept]}">${deptLabels[e.dept]}</div>
        <div class="name">${e.name}</div>
        <div class="role">${e.role}</div>
        <div class="skills">${e.skills.slice(0,4).map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>
        <div class="meta">
          <span class="cost">${e.cost}</span>
          <span class="rating">★ ${e.rating}</span>
        </div>
      </div>
    `).join('');
  } else {
    grid.style.display = 'none';
    tableView.style.display = 'block';
    tableView.innerHTML = `
      <table>
        <thead><tr>
          <th>部门</th><th>AI员工</th><th>角色</th><th>核心技能</th><th>费用</th><th>评分</th>
        </tr></thead>
        <tbody>
          ${filtered.map(e => `
            <tr onclick="openModal(${e.id})" style="cursor:pointer">
              <td><span class="td-dept ${deptClasses[e.dept]}">${deptLabels[e.dept]}</span></td>
              <td><strong>${e.name}</strong></td>
              <td>${e.role}</td>
              <td>${e.skills.slice(0,3).join('、')}</td>
              <td class="td-cost">${e.cost}</td>
              <td class="td-rating">★ ${e.rating}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }
}

function updateStats() {
  const total = employees.length;
  const depts = new Set(employees.map(e=>e.dept)).size;
  const free = employees.filter(e=>e.freeTier).length;
  const avgRating = (employees.reduce((s,e)=>s+e.rating,0)/total).toFixed(1);
  const topRated = employees.filter(e=>e.rating>=4.8).length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDepts').textContent = depts;
  document.getElementById('statFree').textContent = free;
  document.getElementById('statAvg').textContent = avgRating;
  document.getElementById('statTop').textContent = topRated;
}

function filterDept(dept) {
  currentDept = dept;
  // Reset search when changing dept
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.dept === dept));
  render();
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  render();
}

function openModal(id) {
  const e = employees.find(x=>x.id===id);
  if (!e) return;
  const html = `
    <div class="modal-header">
      <div class="dept-badge-modal ${deptClasses[e.dept]}">${deptLabels[e.dept]}</div>
      <h2>${e.name}</h2>
      <div class="role">${e.role} · ★ ${e.rating}</div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3>📝 员工简介</h3>
        <p>${e.desc}</p>
      </div>
      <div class="modal-section">
        <h3>🎯 核心技能</h3>
        <div class="skills-modal">${e.skills.map(s=>`<span class="skill-tag-modal">${s}</span>`).join('')}</div>
      </div>
      <div class="modal-section">
        <h3>✅ 典型工作任务</h3>
        <ul class="tasks-list">${e.tasks.map(t=>`<li>${t}</li>`).join('')}</ul>
      </div>
      <div class="modal-section">
        <h3>💳 薪酬方案</h3>
        ${e.pricing.map(p=>`
          <div class="pricing-row">
            <span><strong>${p.tier}</strong> — ${p.desc}</span>
            <span class="price">${p.price}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="modal-footer">
      <a href="${e.link}" target="_blank" class="btn-primary">🔗 访问官网</a>
      <a href="#" class="btn-secondary" onclick="closeModal();return false;">关闭</a>
    </div>
  `;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

init();
</script>
</body>
</html>
